services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_NAME: workflowdb
      DB_USER: workflowuser
      DB_PASSWORD: workflowpass
      DB_PORT: 5432
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: workflowdb
      POSTGRES_USER: workflowuser
      POSTGRES_PASSWORD: workflowpass
    ports:
      - "5432:5432"
    volumes:
      - ./initdb/init.sql:/docker-entrypoint-initdb.d/init.sql