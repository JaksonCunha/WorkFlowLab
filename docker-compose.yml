services:
  db:
    image: postgres:16
    container_name: workflowlab-db
    environment:
      POSTGRES_DB: workflowdb
      POSTGRES_USER: workflowuser
      POSTGRES_PASSWORD: workflowpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d

  app:
    build: .
    container_name: workflowlab-app
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: workflowdb
      DB_USER: workflowuser
      DB_PASSWORD: workflowpass
      DB_PORT: 5432
    ports:
      - "5000:5000"

volumes:
  postgres_data: